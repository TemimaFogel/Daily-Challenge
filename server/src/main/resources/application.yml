server:
  port: 8080

spring:
  application:
    name: daily-challenge-server
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: 120
  daily:
    # IANA timezone for "today" / daily boundaries (default: Asia/Jerusalem)
    zone: Asia/Jerusalem